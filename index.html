<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>The website for learning about online anonymity</h1>
    <div class="container">
        <aside class="sidebar">
            <details open>
                <summary>Getting Started</summary>
                <ul>
                    <li><a href="#" data-src="/getting-started/introduction">Introduction</a></li>
                </ul>
            </details>
            <details>
                <summary>Tools</summary>
                <ul>
                    <li><a href="#" data-src="/tools/overview">Overview</a></li>
                </ul>
            </details>
            <details>
                <summary>Concepts</summary>
                <ul>
                    <li><a href="#" data-src="/concepts/overview">Overview</a></li>
                </ul>
            </details>
            <details>
                <summary>News</summary>
                <ul>
                    <li><a href="#" data-src="/news/overview">Overview</a></li>
                </ul>
            </details>
        </aside>
        <main class="content">
            <div id="mdContent" class="md-content"></div>
        </main>
    </div>
    <script>
        function loadPage(src) {
            const container = document.getElementById('mdContent');
            container.innerHTML = '<p class="md-loading">Loading…</p>';
            fetch(src)
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.text();
                })
                .then(html => { container.innerHTML = html; })
                .catch(err => {
                    container.innerHTML = `<p class="md-error">Failed to load content: ${err.message}</p>`;
                });
        }

        // Load the default page on first visit
        loadPage('/getting-started/introduction');

        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                const src = link.getAttribute('data-src');
                loadPage(src);
            });
        });
    </script>

</body>

</html>
